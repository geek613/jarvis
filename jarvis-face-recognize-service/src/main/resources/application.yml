spring:
  servlet:
    multipart:
      enabled: true
      max-file-size: 20MB
      max-request-size: 50MB
  application:
    name: jarvis-face-recognition-service # 服务名
  profiles:
    active: dev # 环境标识
  cloud:
    nacos:
      server-addr: 127.0.0.1:8848 # Nacos 地址
      username: nacos
      password: nacos
      config:
        file-extension: yaml # 配置文件格式
        # group: DEFAULT_GROUP # 默认分组，可不填
        namespace: devhspro
      discovery:
        namespace: devhspro
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}?refreshEnabled=true
server:
  port: 6131