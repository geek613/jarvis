spring:
  application:
    name: jarvis-settings-service # 服务名
  profiles:
    active: dev # 环境标识
  cloud:
    nacos:
      server-addr: 192.168.1.9:8848 # Nacos 地址
      username: nacos
      password: nacos
      config:
        file-extension: yaml # 配置文件格式
        # group: DEFAULT_GROUP # 默认分组，可不填
        namespace: devhspro
      discovery:
        namespace: devhspro
  config:
    import:
      - optional:nacos:common.yaml?refreshEnabled=true
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}?refreshEnabled=true
server:
  port: 6135