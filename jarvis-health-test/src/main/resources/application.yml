spring:
  application:
    name: jarvis-health-test-service # 服务名
  profiles:
    active: dev # 环境标识
  cloud:
    nacos:
      username: nacos
      password: nacos
      config:
        server-addr: 127.0.0.1:8848 # Nacos 地址
        file-extension: yaml # 配置文件格式
        # group: DEFAULT_GROUP # 默认分组，可不填
        namespace: devhspro
      discovery:
        namespace: devhspro
  # 关键点：Spring Boot 3.x 必须使 用 import 导入配置
  config:
    import:
      - optional:nacos:${spring.application.name}-${spring.profiles.active}.${spring.cloud.nacos.config.file-extension}?refreshEnabled=true
server:
  port: 8080